<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Automated Launcher — by Sovan</title>
 <style>
   *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

   body {
     font-family: 'Segoe UI', Arial, sans-serif;
     min-height: 100vh;
     color: #fff;
     display: flex;
     flex-direction: column;
     align-items: center;
     justify-content: center;
     gap: 40px;
     padding: 40px 20px;
     transition: background 2s ease;
   }

   body.night     { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); --accent: #a78bfa; }
   body.dawn      { background: linear-gradient(135deg, #1a1a2e, #e96c4c, #f9a825); --accent: #f9a825; }
   body.morning   { background: linear-gradient(135deg, #1e90ff, #87ceeb, #fffde7); --accent: #87ceeb; }
   body.midday    { background: linear-gradient(135deg, #00b4d8, #90e0ef, #caf0f8); --accent: #00b4d8; }
   body.afternoon { background: linear-gradient(135deg, #f77f00, #fcbf49, #eae2b7); --accent: #fcbf49; }
   body.evening   { background: linear-gradient(135deg, #3a0ca3, #f72585, #ff9e00); --accent: #f72585; }
   body.dusk      { background: linear-gradient(135deg, #240046, #7b2d8b, #ff6b6b); --accent: #ff6b6b; }

   .clock-card {
     background: rgba(255,255,255,0.07);
     border: 1px solid rgba(255,255,255,0.12);
     border-radius: 16px;
     padding: 28px 48px;
     text-align: center;
     backdrop-filter: blur(10px);
   }

   .time-of-day-label {
     font-size: 11px;
     font-weight: 600;
     letter-spacing: 2px;
     text-transform: uppercase;
     color: var(--accent);
     margin-bottom: 6px;
     opacity: 0.8;
     transition: color 2s ease;
   }

   .clock-label {
     font-size: 11px;
     font-weight: 600;
     letter-spacing: 3px;
     text-transform: uppercase;
     color: var(--accent);
     margin-bottom: 10px;
     transition: color 2s ease;
   }

   .clock-time {
     font-size: 52px;
     font-weight: 700;
     letter-spacing: 2px;
     line-height: 1;
   }

   .clock-date {
     font-size: 14px;
     color: rgba(255,255,255,0.55);
     margin-top: 8px;
   }

   .launcher-card {
     background: rgba(255,255,255,0.07);
     border: 1px solid rgba(255,255,255,0.12);
     border-radius: 16px;
     padding: 36px 48px;
     text-align: center;
     backdrop-filter: blur(10px);
     width: min(460px, 100%);
   }

   .launcher-card h1 {
     font-size: 22px;
     font-weight: 700;
     margin-bottom: 28px;
     letter-spacing: 0.5px;
   }

   .input-group {
     display: flex;
     align-items: center;
     justify-content: space-between;
     gap: 12px;
     margin-bottom: 16px;
   }

   .input-group label {
     font-size: 14px;
     color: rgba(255,255,255,0.7);
     white-space: nowrap;
     text-align: right;
     min-width: 130px;
   }

   .input-group input {
     padding: 10px 12px;
     font-size: 15px;
     font-weight: 500;
     background: rgba(255,255,255,0.1);
     border: 1px solid rgba(255,255,255,0.2);
     border-radius: 8px;
     color: #fff;
     outline: none;
     transition: border-color 0.2s;
     flex: 1;
   }

   .input-group input:focus { border-color: var(--accent); }

   input[type="number"] { max-width: 90px; text-align: center; flex: none; }

   .btn-row {
     display: flex;
     gap: 12px;
     justify-content: center;
     margin-top: 24px;
   }

   .btn {
     padding: 12px 24px;
     font-size: 14px;
     font-weight: 600;
     cursor: pointer;
     border: none;
     border-radius: 8px;
     transition: opacity 0.2s, transform 0.1s, background 2s ease;
   }

   .btn:hover  { opacity: 0.88; }
   .btn:active { transform: scale(0.97); }

   .btn-tabs    { background: #7c3aed; color: #fff; }
   .btn-windows { background: #2563eb; color: #fff; }

   .footer {
     font-size: 12px;
     color: rgba(255,255,255,0.3);
     letter-spacing: 1px;
   }
 </style>
</head>
<body>

 <div class="clock-card">
   <div class="time-of-day-label" id="tod-label">Night</div>
   <div class="clock-label">Boston Time</div>
   <div class="clock-time" id="clock">00:00:00 AM</div>
   <div class="clock-date" id="date">Loading…</div>
 </div>

 <div class="launcher-card">
   <h1>Automated Launcher</h1>

   <div class="input-group">
     <label for="url">Website URL:</label>
     <input type="text" id="url" value="google.com" placeholder="e.g. google.com">
   </div>

   <div class="input-group">
     <label for="count">How many to open:</label>
     <input type="number" id="count" value="5" min="1">
   </div>

   <div class="btn-row">
     <button class="btn btn-tabs"    onclick="openTabs()">Open as Tabs</button>
     <button class="btn btn-windows" onclick="openWindows()">Open as Windows</button>
   </div>
 </div>

 <div class="footer">Made by Sovan</div>

 <script>
   const themes = [
     { name: 'Night',     cls: 'night',     tabColor: '#4c1d95', winColor: '#1e3a8a' },
     { name: 'Dawn',      cls: 'dawn',      tabColor: '#b45309', winColor: '#c2410c' },
     { name: 'Morning',   cls: 'morning',   tabColor: '#0369a1', winColor: '#0891b2' },
     { name: 'Midday',    cls: 'midday',    tabColor: '#0284c7', winColor: '#0e7490' },
     { name: 'Afternoon', cls: 'afternoon', tabColor: '#b45309', winColor: '#92400e' },
     { name: 'Evening',   cls: 'evening',   tabColor: '#9d174d', winColor: '#6d28d9' },
     { name: 'Dusk',      cls: 'dusk',      tabColor: '#7c3aed', winColor: '#be185d' },
   ];

   function getThemeIndex(hour) {
     if (hour < 5)  return 0;
     if (hour < 7)  return 1;
     if (hour < 10) return 2;
     if (hour < 12) return 3;
     if (hour < 17) return 4;
     if (hour < 20) return 5;
     return 6;
   }

   function applyTheme(hour) {
     const t = themes[getThemeIndex(hour)];
     document.body.className = t.cls;
     document.getElementById('tod-label').textContent = t.name;
     document.querySelector('.btn-tabs').style.background    = t.tabColor;
     document.querySelector('.btn-windows').style.background = t.winColor;
   }

   function updateClock() {
     const now = new Date();
     document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', {
       timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
     });
     document.getElementById('date').textContent = now.toLocaleDateString('en-US', {
       timeZone: 'America/New_York', weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
     });
     const etHour = parseInt(now.toLocaleString('en-US', {
       timeZone: 'America/New_York', hour: 'numeric', hour12: false
     }));
     applyTheme(etHour);
   }

   updateClock();
   setInterval(updateClock, 1000);

   function getCount() {
     const n = parseInt(document.getElementById('count').value);
     return isNaN(n) || n < 1 ? 1 : n;
   }

   function getUrl() {
     let url = document.getElementById('url').value.trim();
     if (!url) return 'https://google.com';
     if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
     return url;
   }

   function openTabs() {
     const count = getCount(), url = getUrl();
     for (let i = 0; i < count; i++) window.open(url, '_blank');
   }

   function openWindows() {
     const count = getCount(), url = getUrl();
     for (let i = 0; i < count; i++) window.open(url, '', 'width=800,height=600');
   }
 </script>
</body>
</html>
