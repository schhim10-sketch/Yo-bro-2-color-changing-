<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automated Launcher — by Sovan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 40px 20px;
      transition: background 2s ease;
    }

    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }

    .clock-card { padding: 28px 48px; text-align: center; }

    .time-of-day-label {
      font-size: 11px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; color: var(--accent, #a78bfa);
      margin-bottom: 6px; opacity: 0.8;
    }

    .clock-label {
      font-size: 11px; font-weight: 600; letter-spacing: 3px;
      text-transform: uppercase; color: var(--accent, #a78bfa); margin-bottom: 10px;
    }

    .clock-time { font-size: 52px; font-weight: 700; letter-spacing: 2px; line-height: 1; }
    .clock-date { font-size: 14px; color: rgba(255,255,255,0.55); margin-top: 8px; }

    .launcher-card { padding: 36px 48px; text-align: center; width: min(460px, 100%); }
    .launcher-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 28px; letter-spacing: 0.5px; }

    .input-group { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .input-group label { font-size: 14px; color: rgba(255,255,255,0.7); white-space: nowrap; text-align: right; min-width: 130px; }
    .input-group input[type="text"], .input-group input[type="number"] {
      padding: 10px 12px; font-size: 15px; font-weight: 500;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px; color: #fff; outline: none; transition: border-color 0.2s; flex: 1;
    }
    .input-group input:focus { border-color: var(--accent, #a78bfa); }
    input[type="number"] { max-width: 90px; text-align: center; flex: none !important; }

    .btn-row { display: flex; gap: 12px; justify-content: center; margin-top: 24px; }
    .btn { padding: 12px 24px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; border-radius: 8px; transition: opacity 0.2s, transform 0.1s; color: #fff; }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }
    .btn-tabs { background: #7c3aed; }
    .btn-windows { background: #2563eb; }

    .footer { font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 1px; }

    .settings-toggle {
      position: fixed; top: 16px; right: 16px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 600;
      color: #fff; cursor: pointer; transition: background 0.2s; z-index: 100;
    }
    .settings-toggle:hover { background: rgba(255,255,255,0.2); }

    .settings-panel {
      position: fixed; top: 0; right: 0;
      width: min(320px, 100vw); height: 100vh;
      background: rgba(15,12,41,0.97); border-left: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px); padding: 24px 20px; overflow-y: auto;
      transform: translateX(100%); transition: transform 0.3s ease; z-index: 200;
    }
    .settings-panel.open { transform: translateX(0); }
    .settings-panel h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px; }
    .settings-panel p.subtitle { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 24px; }

    .settings-close {
      position: absolute; top: 20px; right: 20px;
      background: none; border: none; color: rgba(255,255,255,0.5); font-size: 20px; cursor: pointer; line-height: 1;
    }
    .settings-close:hover { color: #fff; }

    .setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .setting-row span { font-size: 13px; color: rgba(255,255,255,0.75); }
    .color-pair { display: flex; gap: 6px; align-items: center; }

    input[type="color"] {
      width: 36px; height: 28px; border: none; border-radius: 6px;
      cursor: pointer; padding: 2px; background: rgba(255,255,255,0.1);
    }

    .color-label { font-size: 10px; color: rgba(255,255,255,0.35); text-align: center; margin-top: 2px; }
    .color-swatch { display: flex; flex-direction: column; align-items: center; }

    .section-title {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,0.3); margin: 20px 0 12px;
    }

    .reset-btn {
      width: 100%; margin-top: 24px; padding: 10px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .reset-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }
  </style>
</head>
<body>

  <button class="settings-toggle" onclick="toggleSettings()">Customize</button>

  <div class="settings-panel" id="settingsPanel">
    <button class="settings-close" onclick="toggleSettings()">✕</button>
    <h2>Customize Colors</h2>
    <p class="subtitle">Pick colors for each time of day.</p>

    <div class="section-title">Right Now</div>
    <div class="setting-row">
      <span>Override background</span>
      <div class="color-pair">
        <div class="color-swatch">
          <input type="color" id="overrideC1" oninput="applyOverride()">
          <div class="color-label">Start</div>
        </div>
        <div class="color-swatch">
          <input type="color" id="overrideC2" oninput="applyOverride()">
          <div class="color-label">Mid</div>
        </div>
        <div class="color-swatch">
          <input type="color" id="overrideC3" oninput="applyOverride()">
          <div class="color-label">End</div>
        </div>
      </div>
    </div>
    <button class="reset-btn" style="margin-top:4px; margin-bottom:8px;" onclick="clearOverride()">Clear Override</button>

    <div class="section-title">Background by Time of Day</div>
    <div id="colorSettings"></div>

    <button class="reset-btn" onclick="resetDefaults()">Reset to Defaults</button>
  </div>

  <div class="card clock-card">
    <div class="time-of-day-label" id="tod-label">Night</div>
    <div class="clock-label">Boston Time</div>
    <div class="clock-time" id="clock">00:00:00 AM</div>
    <div class="clock-date" id="date">Loading…</div>
  </div>

  <div class="card launcher-card">
    <h1>Automated Launcher</h1>
    <div class="input-group">
      <label for="url">Website URL:</label>
      <input type="text" id="url" value="google.com" placeholder="e.g. google.com">
    </div>
    <div class="input-group">
      <label for="count">How many to open:</label>
      <input type="number" id="count" value="5" min="1">
    </div>
    <div class="btn-row">
      <button class="btn btn-tabs" onclick="openTabs()">Open as Tabs</button>
      <button class="btn btn-windows" onclick="openWindows()">Open as Windows</button>
    </div>
  </div>

  <div class="footer">Made by Sovan</div>

  <script>
    const DEFAULTS = [
      { name: 'Night',     c1: '#0f0c29', c2: '#302b63', c3: '#24243e', accent: '#a78bfa' },
      { name: 'Dawn',      c1: '#1a1a2e', c2: '#e96c4c', c3: '#f9a825', accent: '#f9a825' },
      { name: 'Morning',   c1: '#1e90ff', c2: '#87ceeb', c3: '#fffde7', accent: '#87ceeb' },
      { name: 'Midday',    c1: '#00b4d8', c2: '#90e0ef', c3: '#caf0f8', accent: '#00b4d8' },
      { name: 'Afternoon', c1: '#f77f00', c2: '#fcbf49', c3: '#eae2b7', accent: '#fcbf49' },
      { name: 'Evening',   c1: '#3a0ca3', c2: '#f72585', c3: '#ff9e00', accent: '#f72585' },
      { name: 'Dusk',      c1: '#240046', c2: '#7b2d8b', c3: '#ff6b6b', accent: '#ff6b6b' },
    ];

    let themes = JSON.parse(localStorage.getItem('themes') || 'null') || JSON.parse(JSON.stringify(DEFAULTS));
    let override = JSON.parse(localStorage.getItem('override') || 'null');

    function saveThemes() { localStorage.setItem('themes', JSON.stringify(themes)); }

    function resetDefaults() {
      themes = JSON.parse(JSON.stringify(DEFAULTS));
      saveThemes();
      buildColorSettings();
      applyTheme(getCurrentEtHour());
    }

    function buildColorSettings() {
      const container = document.getElementById('colorSettings');
      container.innerHTML = '';
      themes.forEach((t, i) => {
        const row = document.createElement('div');
        row.className = 'setting-row';
        row.innerHTML = `
          <span>${t.name}</span>
          <div class="color-pair">
            <div class="color-swatch"><input type="color" value="${t.c1}" oninput="updateColor(${i},'c1',this.value)"><div class="color-label">Start</div></div>
            <div class="color-swatch"><input type="color" value="${t.c2}" oninput="updateColor(${i},'c2',this.value)"><div class="color-label">Mid</div></div>
            <div class="color-swatch"><input type="color" value="${t.c3}" oninput="updateColor(${i},'c3',this.value)"><div class="color-label">End</div></div>
          </div>`;
        container.appendChild(row);
      });
    }

    function updateColor(i, key, val) {
      themes[i][key] = val;
      saveThemes();
      applyTheme(getCurrentEtHour());
    }

    function getThemeIndex(hour) {
      if (hour < 5)  return 0;
      if (hour < 7)  return 1;
      if (hour < 10) return 2;
      if (hour < 12) return 3;
      if (hour < 17) return 4;
      if (hour < 20) return 5;
      return 6;
    }

    function getCurrentEtHour() {
      return parseInt(new Date().toLocaleString('en-US', {
        timeZone: 'America/New_York', hour: 'numeric', hour12: false
      }));
    }

    function applyTheme(hour) {
      const t = themes[getThemeIndex(hour)];
      if (!override) {
        document.body.style.background = `linear-gradient(135deg, ${t.c1}, ${t.c2}, ${t.c3})`;
      }
      document.documentElement.style.setProperty('--accent', t.accent);
      document.getElementById('tod-label').textContent = t.name;
    }

    function syncOverridePickers() {
      const t = themes[getThemeIndex(getCurrentEtHour())];
      const src = override || t;
      document.getElementById('overrideC1').value = src.c1;
      document.getElementById('overrideC2').value = src.c2;
      document.getElementById('overrideC3').value = src.c3;
    }

    function applyOverride() {
      override = {
        c1: document.getElementById('overrideC1').value,
        c2: document.getElementById('overrideC2').value,
        c3: document.getElementById('overrideC3').value,
      };
      localStorage.setItem('override', JSON.stringify(override));
      document.body.style.background = `linear-gradient(135deg, ${override.c1}, ${override.c2}, ${override.c3})`;
    }

    function clearOverride() {
      override = null;
      localStorage.removeItem('override');
      applyTheme(getCurrentEtHour());
      syncOverridePickers();
    }

    function toggleSettings() {
      syncOverridePickers();
      document.getElementById('settingsPanel').classList.toggle('open');
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', {
        timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
      });
      document.getElementById('date').textContent = now.toLocaleDateString('en-US', {
        timeZone: 'America/New_York', weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
      applyTheme(getCurrentEtHour());
    }

    function getCount() {
      const n = parseInt(document.getElementById('count').value);
      return isNaN(n) || n < 1 ? 1 : n;
    }

    function getUrl() {
      let url = document.getElementById('url').value.trim();
      if (!url) return 'https://google.com';
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      return url;
    }

    function openTabs() {
      const count = getCount(), url = getUrl();
      for (let i = 0; i < count; i++) window.open(url, '_blank');
    }

    function openWindows() {
      const count = getCount(), url = getUrl();
      for (let i = 0; i < count; i++) window.open(url, '', 'width=800,height=600');
    }

    buildColorSettings();
    updateClock();
    if (override) {
      document.body.style.background = `linear-gradient(135deg, ${override.c1}, ${override.c2}, ${override.c3})`;
    }
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
